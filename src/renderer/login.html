<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Neurolinks - Panel de administración - login</title>
  <link href="/assets/icons/favicon-32x32.png" rel="icon" type="image/png" sizes="32x32">
  <link href="/assets/icons/favicon-16x16.png" rel="icon" type="image/png" sizes="16x16">
  <link href="/assets/icons/favicon.ico" rel="shortcut icon">
  <link href="/assets/icons/apple-touch-icon.png" rel="apple-touch-icon">
  <!-- PWA -->
  <link rel="manifest" href="/assets/manifest.json">
  <meta name="theme-color" content="#0f1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Neurolinks">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
  <style>
    :root {
      --accent-primary: #38bdf8;
      --accent-secondary: #c084fc;
      --bg-card: rgba(15, 20, 35, 0.72);
      --border-soft: rgba(255, 255, 255, 0.08);
      --border-light: rgba(255, 255, 255, 0.14);
      --text-dim: #64748b;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ---- Fondo ---- */
    .login-bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      filter: brightness(0.32) saturate(1.3);
    }

    .login-overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(56, 189, 248, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(192, 132, 252, 0.08) 0%, transparent 60%),
        linear-gradient(180deg, rgba(11, 15, 26, 0.55) 0%, rgba(11, 15, 26, 0.75) 100%);
      z-index: 1;
    }

    /* ---- Card ---- */
    .login-card {
      position: relative;
      z-index: 2;
      width: min(420px, 92vw);
      background: var(--bg-card);
      backdrop-filter: blur(28px) saturate(1.6);
      -webkit-backdrop-filter: blur(28px) saturate(1.6);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 1px 0 rgba(255,255,255,0.08) inset;
      overflow: hidden;
    }

    /* ---- Header de la card ---- */
    .login-header {
      padding: 36px 36px 28px;
      text-align: center;
      border-bottom: 1px solid var(--border-soft);
      position: relative;
    }

    .login-logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(56,189,248,0.2) 0%, rgba(192,132,252,0.2) 100%);
      border: 1px solid rgba(56,189,248,0.25);
      margin-bottom: 16px;
      position: relative;
    }

    .login-logo-wrap i {
      font-size: 1.7rem;
      background: linear-gradient(135deg, #38bdf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #e2e8f0;
      margin: 0 0 6px;
      letter-spacing: -0.01em;
    }

    .login-subtitle {
      font-size: 0.78rem;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ---- Body ---- */
    .login-body {
      padding: 28px 36px 32px;
    }

    /* ---- Input group ---- */
    .login-input-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .login-input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 0.95rem;
      pointer-events: none;
      z-index: 2;
    }

    .login-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      color: #e2e8f0;
      font-size: 0.92rem;
      padding: 13px 44px 13px 42px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .login-input::placeholder { color: #475569; }

    .login-input:focus {
      border-color: rgba(56, 189, 248, 0.5);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
    }

    .login-toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 4px;
      font-size: 0.95rem;
      z-index: 2;
      line-height: 1;
    }

    .login-toggle-pw:hover { color: #94a3b8; }

    /* ---- Error ---- */
    .login-error {
      display: none;
      align-items: center;
      gap: 6px;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.25);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.8rem;
      color: #f87171;
      margin-bottom: 16px;
    }

    /* ---- Botón ---- */
    .login-btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #38bdf8 0%, #818cf8 50%, #c084fc 100%);
      color: #0f172a;
      letter-spacing: 0.01em;
      transition: opacity 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .login-btn:hover:not(:disabled) {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .login-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* ---- Footer ---- */
    .login-footer {
      padding: 14px 36px 18px;
      text-align: center;
      border-top: 1px solid var(--border-soft);
    }

    .login-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 0.03em;
    }

    .login-badge i { font-size: 0.7rem; }
  </style>
</head>

<body class="bg-dark text-light" data-theme="dark">

  <video class="login-bg-video" autoplay muted loop playsinline>
    <source src="/assets/video-cover-2.mp4" type="video/mp4">
  </video>
  <div class="login-overlay"></div>

  <div class="login-card">

    <!-- Header -->
    <div class="login-header">
      <div class="login-logo-wrap">
        <i class="bi bi-cpu-fill"></i>
      </div>
      <div class="login-title">Neurolinks Control</div>
      <div class="login-subtitle">Panel de administración</div>
    </div>

    <!-- Form -->
    <div class="login-body">
      <form id="login-form">

        <div class="login-input-wrap">
          <i class="bi bi-lock login-input-icon"></i>
          <input
            type="password"
            id="password-input"
            class="login-input"
            placeholder="Contraseña"
            autofocus
          >
          <button type="button" class="login-toggle-pw" id="toggle-pw" tabindex="-1">
            <i class="bi bi-eye" id="toggle-pw-icon"></i>
          </button>
        </div>

        <div class="d-flex align-items-center mb-3" style="padding: 0 2px;">
          <input class="form-check-input me-2" type="checkbox" id="remember-me" style="cursor:pointer;background-color:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.2);width:16px;height:16px;flex-shrink:0;">
          <label for="remember-me" style="font-size:0.8rem;color:var(--text-dim);cursor:pointer;user-select:none;">Recordar sesión</label>
        </div>

        <div class="login-error" id="error-msg">
          <i class="bi bi-exclamation-circle-fill"></i>
          Contraseña incorrecta
        </div>

        <button type="submit" class="login-btn" id="login-btn">
          Ingresar
        </button>

      </form>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <span class="login-badge">
        <i class="bi bi-shield-lock"></i>
        Acceso restringido · Solo personal autorizado
      </span>
    </div>

  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
  <script>
    // Toggle show/hide password
    document.getElementById('toggle-pw').onclick = () => {
      const input = document.getElementById('password-input');
      const icon = document.getElementById('toggle-pw-icon');
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      icon.className = isPassword ? 'bi bi-eye-slash' : 'bi bi-eye';
    };

    // Restore remember-me preference
    const rememberEl = document.getElementById('remember-me');
    rememberEl.checked = localStorage.getItem('rememberMe') === '1';

    // Login submit
    document.getElementById('login-form').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorMsg = document.getElementById('error-msg');
      const password = document.getElementById('password-input').value;
      const rememberMe = rememberEl.checked;

      localStorage.setItem('rememberMe', rememberMe ? '1' : '0');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" style="width:14px;height:14px;border-width:2px;"></span>Ingresando...';
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password, rememberMe })
        });

        if (res.ok) {
          window.location.href = '/';
        } else {
          errorMsg.style.display = 'flex';
          btn.disabled = false;
          btn.textContent = 'Ingresar';
          document.getElementById('password-input').focus();
        }
      } catch {
        errorMsg.style.display = 'flex';
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    };
  </script>

</body>

</html>
