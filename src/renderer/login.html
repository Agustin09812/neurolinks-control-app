<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neurolinks Control</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/admin/assets/css/styles.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 340px;
    }
  </style>
</head>

<body class="bg-dark text-light" data-theme="dark">

  <div class="login-card glass-card p-4">

    <div class="text-center mb-4">
      <i class="bi bi-cpu fs-2 text-info d-block mb-2"></i>
      <h5 class="fw-bold mb-0">Neurolinks Control</h5>
      <div class="small text-dim mt-1">Panel de administración</div>
    </div>

    <form id="login-form">
      <div class="mb-3">
        <input
          type="password"
          id="password-input"
          class="form-control bg-dark text-light border-secondary"
          placeholder="Contraseña"
          autofocus
        >
      </div>

      <div id="error-msg" class="text-danger small mb-3" style="display:none">
        <i class="bi bi-exclamation-circle me-1"></i>Contraseña incorrecta
      </div>

      <button type="submit" class="btn btn-outline-info w-100" id="login-btn">
        Ingresar
      </button>
    </form>

  </div>

  <script>
    document.getElementById('login-form').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorMsg = document.getElementById('error-msg');
      const password = document.getElementById('password-input').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Ingresando...';
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        if (res.ok) {
          window.location.href = '/admin';
        } else {
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Ingresar';
          document.getElementById('password-input').focus();
        }
      } catch {
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    };
  </script>

</body>

</html>
