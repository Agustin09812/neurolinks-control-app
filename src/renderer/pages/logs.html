<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Logs - Neurolinks Control</title>

  <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../../assets/css/styles.css">
</head>

<body class="bg-dark text-light vh-100 d-flex flex-column">

  <!-- HEADER -->
  <div class="border-bottom border-secondary py-3 px-4 d-flex justify-content-between align-items-center">
    <div>
      <h4 class="mb-0 fw-bold">SERVICE LOGS</h4>
      <small id="deployment-id" class="text-secondary"></small>
    </div>

    <div class="d-flex gap-2">
      <button id="btn-refresh" class="btn btn-outline-light btn-sm">
        Actualizar
      </button>
    </div>
  </div>

  <!-- LOG CONTAINER -->
  <div class="flex-grow-1 d-flex p-3 container h-50">

    <div id="logs-container" class="logs-terminal p-3 rounded">
      Cargando logs...
    </div>

  </div>

  <script>
    let currentDeploymentId = null;

    async function loadLogs() {

      if (!currentDeploymentId) return;

      const logs = await window.api.fetchDeploymentLogs(currentDeploymentId);

      const container = document.getElementById("logs-container");

      if (!logs || logs.length === 0) {
        container.textContent = "No logs found";
        return;
      }

      container.innerHTML = logs.map(log => {

        let color = "#ccc";

        if (log.severity === "ERROR") color = "#ff4d4f";
        if (log.severity === "WARN") color = "#faad14";
        if (log.severity === "INFO") color = "#52c41a";

        return `
            <div class="log-line" style="color:${color}">
              <div class="container-fluid"><span class="log-time">[${new Date(log.timestamp).toLocaleTimeString()}]</span></div>
              <div class="container-fluid">${log.message}</div>
            </div>
          `;
      }).join("");

      container.scrollTop = container.scrollHeight;
    }

    window.api.onLoadLogs(async (deploymentId) => {
      currentDeploymentId = deploymentId;
      document.getElementById("deployment-id").textContent = deploymentId;
      await loadLogs();
    });

    document.getElementById("btn-refresh").onclick = loadLogs;
  </script>

  <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
