<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Neurolinks Control</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">

  <!-- Tus estilos -->
  <link rel="stylesheet" href="../../assets/css/styles.css">

  <style>
    body {
      background: #0d0f12;
      overflow: hidden;
    }

    .splash-container {
      animation: splashFadeIn 0.8s ease forwards;
    }

    @keyframes splashFadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .splash-title {
      letter-spacing: 1px;
      font-weight: 600;
    }

    .splash-version {
      font-size: 12px;
      color: #666;
    }
  </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100 text-light">

  <div class="text-center splash-container">

    <h2 class="splash-title mb-4">NEUROLINKS CONTROL</h2>

    <div class="d-flex justify-content-center mb-3">
      <div class="spinner-border text-primary" role="status"></div>
    </div>
    <div id="update-box" style="display:none;">
      <p class="mt-3 text-warning">Nueva versión disponible</p>
      
      <div id="download-actions">
          <button id="btnConfirmDownload" class="btn btn-success btn-sm w-100">
              Confirmar e Instalar Ahora
          </button>
      </div>

      <div id="progress-container" class="mt-3" style="display:none;">
          <div class="progress" style="height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden;">
              <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" 
                   role="progressbar" style="width: 0%"></div>
          </div>
          <small class="text-secondary mt-2 d-block" id="progress-text">Descargando: 0%</small>
      </div>
    </div>

    <div class="splash-version">v1.1.0</div>

  </div>

  <script>
    let updateData = null;

    // Mostrar versión en splash
    window.api?.onLoadVersion?.((version) => {
      const el = document.querySelector(".splash-version");
      if (el) el.textContent = "v" + version;
    });

    // Cuando hay update disponible
    window.api?.onUpdateAvailable?.((data) => {
      updateData = data;
      const spinner = document.querySelector(".spinner-border");
      if (spinner) spinner.style.display = "none";

      const box = document.getElementById("update-box");
      if (box) box.style.display = "block";

      const text = box.querySelector("p");
      if (text) text.textContent = `Nueva versión disponible (v${data.version})`;
    });

    const btnConfirm = document.getElementById("btnConfirmDownload");
    const progressContainer = document.getElementById("progress-container");
    const progressBar = document.getElementById("progress-bar");
    const progressText = document.getElementById("progress-text");
    const actions = document.getElementById("download-actions");

    if (btnConfirm) {
      btnConfirm.onclick = () => {
          if (!updateData) return;
          actions.style.display = "none";
          progressContainer.style.display = "block";
          
          window.api.startDownloadUpdate(updateData.url);
      };
    }

    window.api?.onDownloadProgress?.((progress) => {
      if (progressBar) progressBar.style.width = progress + "%";
      if (progressText) progressText.textContent = `Descargando: ${progress}%`;
    });
  </script>

</body>


</html>
