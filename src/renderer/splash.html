<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Neurolinks Control</title>
  <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../../node_modules/bootstrap-icons/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../../assets/css/styles.css">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 text-light" data-theme="dark">

  <!-- Cargar tema guardado antes del render para evitar flash -->
  <script>
    try {
      const t = localStorage.getItem('theme') || 'dark';
      document.body.dataset.theme = t;
    } catch(e) {}
  </script>

  <div class="text-center splash-container">

    <h2 class="splash-title mb-4">NEUROLINKS CONTROL</h2>

    <div id="loading-section">

      <div class="d-flex justify-content-center mb-3">
        <div class="spinner-border text-primary" role="status"></div>
      </div>

      <p class="text-secondary small">
        Buscando actualizaciones...
      </p>

    </div>

    <div id="update-box" style="display:none;">
      <p id="update-message" class="mt-3 text-warning">
        Nueva versión disponible
      </p>
    </div>

    <div class="splash-version"></div>

  </div>

  <script>

    // mostrar version actual
    window.api?.onLoadVersion?.((version) => {
      const el = document.querySelector(".splash-version");
      if (el) el.textContent = "v" + version;
    });

    // cuando hay update
    window.api?.onUpdateAvailable?.((data) => {

      document.getElementById("loading-section").style.display = "none";
      document.getElementById("update-box").style.display = "block";

      const msg = document.getElementById("update-message");

      if (msg && data?.version) {
        msg.textContent = "Nueva versión disponible: v" + data.version;
      }

    });

  </script>

</body>

</html>
