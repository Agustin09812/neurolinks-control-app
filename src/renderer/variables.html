<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Variables - Neurolinks Control</title>

  <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../../node_modules/bootstrap-icons/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../../assets/css/styles.css">
</head>

<body class="bg-dark text-light vh-100 d-flex flex-column">

  <!-- HEADER -->
  <div class="border-bottom border-secondary py-3 px-4 d-flex justify-content-between align-items-center">
    <div>
      <h4 class="mb-0 fw-bold">SERVICE VARIABLES</h4>
      <small id="service-info" class="text-secondary"></small>
    </div>

    <div class="d-flex gap-2">
      <button id="btn-refresh" class="btn btn-outline-light btn-sm">
        <i class="bi bi-arrow-repeat"></i> Actualiar
      </button>

      <button id="btn-add" class="btn btn-success btn-sm">
        <i class="bi bi-plus"></i> Añadir
      </button>

      <button id="btn-redeploy" class="btn btn-warning btn-sm" disabled>
        <i class="bi bi-arrow-clockwise"></i> Redeploy
      </button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="flex-grow-1 d-flex p-3">
    <div class="table-responsive w-100">
      <table class="table table-dark table-hover align-middle">
        <thead>
          <tr>
            <th style="width: 30%">Name</th>
            <th style="width: 50%">Value</th>
            <th style="width: 20%">Actions</th>
          </tr>
        </thead>
        <tbody id="variables-table">
          <tr>
            <td colspan="3" class="text-center text-secondary">
              Loading variables...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content bg-dark text-light border-secondary">

        <div class="modal-header border-secondary">
          <h5 class="modal-title">Edit Variable</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <input type="hidden" id="var-name-hidden">

          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" id="var-name" class="form-control bg-dark text-light border-secondary">
          </div>

          <div>
            <label class="form-label">Value</label>
            <textarea id="var-value" rows="4" class="form-control bg-dark text-light border-secondary"></textarea>
          </div>
        </div>

        <div class="modal-footer border-secondary">
          <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">
            Cancel
          </button>
          <button class="btn btn-success btn-sm" id="btn-save-variable">
            Save
          </button>
        </div>

      </div>
    </div>
  </div>

  <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    let currentProjectId = null;
    let currentEnvironmentId = null;
    let currentServiceId = null;
    let hasPendingChanges = false;

    const tableBody = document.getElementById("variables-table");
    const editModal = new bootstrap.Modal(document.getElementById('editModal'));

    // --------------------------------------------------
    // RECEIVE CONTEXT FROM MAIN
    // --------------------------------------------------

    window.api.onLoadVariables(async (context) => {

      currentProjectId = context.projectId;
      currentEnvironmentId = context.environmentId;
      currentServiceId = context.serviceId;

      document.getElementById("service-info").textContent =
        `Project: ${context.projectId} | Service: ${context.serviceId}`;

      await loadVariables();
    });

    // --------------------------------------------------
    // LOAD VARIABLES
    // --------------------------------------------------

    async function loadVariables() {

      tableBody.innerHTML =
        `<tr><td colspan="3" class="text-center text-secondary">Loading...</td></tr>`;

      const variables = await window.api.getServiceVariables(
        currentProjectId,
        currentEnvironmentId,
        currentServiceId
      );

      const entries = Object.entries(variables);

      if (entries.length === 0) {
        tableBody.innerHTML =
          `<tr><td colspan="3" class="text-center text-secondary">No variables found</td></tr>`;
        return;
      }

      tableBody.innerHTML = entries.map(([name, value]) => `
        <tr>
          <td><strong>${name}</strong></td>
          <td class="text-break">${value}</td>
          <td>
            <button class="btn btn-sm btn-outline-info me-2"
              onclick="openEdit('${name}', \`${value}\`)">
              <i class="bi bi-pencil"></i>
            </button>

            <button class="btn btn-sm btn-outline-danger"
              onclick="deleteVariable('${name}')">
              <i class="bi bi-trash"></i>
            </button>

          </td>
        </tr>
      `).join("");
    }

    // --------------------------------------------------
    // EDIT
    // --------------------------------------------------

    function openEdit(name, value) {
      document.getElementById("var-name").value = name;
      document.getElementById("var-name-hidden").value = name;
      document.getElementById("var-value").value = value;
      editModal.show();
    }

    document.getElementById("btn-save-variable").onclick = async () => {

      const name = document.getElementById("var-name").value.trim();
      const value = document.getElementById("var-value").value;

      if (!name) return;

      await window.api.upsertVariable(
        currentProjectId,
        currentEnvironmentId,
        currentServiceId,
        name,
        value
      );

      hasPendingChanges = true;
      document.getElementById("btn-redeploy").disabled = false;

      editModal.hide();
      await loadVariables();
    };

    // --------------------------------------------------
    // DELETE
    // --------------------------------------------------

    async function deleteVariable(name) {

      if (!confirm(`Delete variable ${name}?`)) return;

      await window.api.deleteVariable(
        currentProjectId,
        currentEnvironmentId,
        currentServiceId,
        name
      );

      hasPendingChanges = true;
      document.getElementById("btn-redeploy").disabled = false;

      await loadVariables();
    }

    // --------------------------------------------------
    // ADD
    // --------------------------------------------------

    document.getElementById("btn-add").onclick = () => {
      document.getElementById("var-name").value = "";
      document.getElementById("var-name-hidden").value = "";
      document.getElementById("var-value").value = "";
      editModal.show();
    };

    document.getElementById("btn-refresh").onclick = loadVariables;

    document.getElementById("btn-redeploy").onclick = async () => {

      if (!hasPendingChanges) return;

      if (!confirm("Apply changes and redeploy service?")) return;

      await window.api.redeployServiceInstance(
        currentServiceId,
        currentEnvironmentId
      );

      hasPendingChanges = false;
      document.getElementById("btn-redeploy").disabled = true;

      alert("Redeploy triggered successfully.");
    };

  </script>

</body>

</html>
